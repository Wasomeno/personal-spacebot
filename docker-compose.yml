services:
  spacebot:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/spacedriveapp/spacebot:latest
    container_name: spacebot
    restart: unless-stopped
    ports:
      - "19898:19898"
      - "18789:18789"
    environment:
      SPACEBOT_DIR: /data
      SPACEBOT_DEPLOYMENT: docker
      SPACEBOT_CRON_TIMEZONE: Asia/Jakarta
      BIFROST_URL: ${BIFROST_URL}
      BIFROST_VIRTUAL_KEY: ${BIFROST_VIRTUAL_KEY}
      SPACEBOT_WEBHOOK_TOKEN: ${SPACEBOT_WEBHOOK_TOKEN:-hermes-orchestrator-secret}
    volumes:
      - spacebot-data:/data
    healthcheck:
      disable: true
