services:
  spacebot:
    image: ghcr.io/spacedriveapp/spacebot:latest
    container_name: spacebot
    restart: unless-stopped
    ports:
      - "19898:19898"
    environment:
      SPACEBOT_DIR: /data
      SPACEBOT_DEPLOYMENT: docker
      SPACEBOT_CRON_TIMEZONE: Asia/Jakarta

      # Bifrost gateway (routes to Anthropic, MiniMax, etc.)
      BIFROST_URL: ${BIFROST_URL}
      BIFROST_VIRTUAL_KEY: ${BIFROST_VIRTUAL_KEY}

      # Optional channel tokens (uncomment what you use)
      # DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      # SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      # SLACK_APP_TOKEN: ${SLACK_APP_TOKEN}
      # TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
    volumes:
      - spacebot-data:/data
      - ./config.toml:/data/config.toml:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:19898/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  spacebot-data:
    driver: local
