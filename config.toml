# ===============================================
# Spacebot config.toml — Bifrost (Anthropic + MiniMax)
# ===============================================
# Bifrost handles routing to both Anthropic and MiniMax
# Spacebot sends all LLM calls to Bifrost, Bifrost routes to the right provider

# --- LLM Provider: Bifrost Gateway ---
[llm]
openai_key = "env:BIFROST_VIRTUAL_KEY"

# --- Custom Provider: Bifrost ---
# Bifrost acts as an OpenAI-compatible gateway
[[providers]]
name = "bifrost"
api_type = "anthropic"
base_url = "env:BIFROST_URL"
api_key = "env:BIFROST_VIRTUAL_KEY"

# --- Model Routing ---
# Tell Spacebot which model name maps to which provider
# These model names must match what you configured in Bifrost

[defaults.routing]
# Channel (user-facing) model — pick one:
# Option A: Anthropic via Bifrost
channel_model = "Minimax/minimax-m2.7"
# Option B: MiniMax via Bifrost
# channel_model = "Minimax/minimax-m2.7"

# Worker (background task) model
worker_model = "Minimax/minimax-m2.7"

# --- Instance Settings ---
cron_timezone = "Asia/Jakarta"

# --- Web Server ---
[server]
port = 19898

# --- Channels (enable what you need) ---
[messaging.discord]
enabled = false
token = "env:DISCORD_BOT_TOKEN"

[messaging.slack]
enabled = false
token = "env:SLACK_BOT_TOKEN"
app_token = "env:SLACK_APP_TOKEN"

[messaging.telegram]
enabled = false
token = "env:TELEGRAM_BOT_TOKEN"

# --- Binding: connect channels to agents ---
# Uncomment and configure after setting up a channel
# [[bindings]]
# agent_id = "main"
# channel = "discord"
# guild_id = "YOUR_GUILD_ID"
# channel_ids = ["YOUR_CHANNEL_ID"]

# --- Default Agent ---
[[agents]]
id = "main"
default = true
